name: Verify Deployment Configuration

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify-deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify deployment configuration
        run: npm run verify:deployment

      - name: Check for critical issues
        run: |
          echo "Checking for common deployment issues..."

          # Check that base path is not '/' for production
          if grep -q "base: '/'" vite.config.ts | grep -v "command"; then
            echo "::error::Base path is set to '/' which will break GitHub Pages deployment!"
            exit 1
          fi

          # Check that assets have correct base path
          if ! grep -q "/finance-tracker/assets/" dist/index.html; then
            echo "::error::Production build missing /finance-tracker/ base path in assets!"
            exit 1
          fi

          echo "✅ All deployment checks passed!"
